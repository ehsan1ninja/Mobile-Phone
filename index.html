<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO Title -->
  <title>Best Mobile Phones 2026 | Latest Smartphones Price & Features</title>

  <!-- SEO Meta -->
  <meta name="description" content="Buy latest mobile phones 2026 with price, features, reviews. Compare iPhone, Samsung, Pixel smartphones in one place.">
  <meta name="keywords" content="mobile phones, smartphones 2026, iPhone price, Samsung phones, buy mobile online">
  <meta name="robots" content="index, follow">

  <!-- Canonical -->
  <link rel="canonical" href="https://yourdomain.com/">

  <!-- Open Graph -->
  <meta property="og:title" content="Best Mobile Phones 2026">
  <meta property="og:description" content="Compare latest smartphones with price and features">
  <meta property="og:image" content="https://images.unsplash.com/photo-1598327105666-5b89351aff97">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f8fafc;
    }

    header {
      background: linear-gradient(135deg,#020617,#1d4ed8);
      color: white;
      padding: 40px;
      text-align: center;
    }

    h1 { font-size: 2.5rem; }

    .container {
      width: 90%;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
      padding: 40px 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .card img {
      width: 150px;
      loading: lazy;
    }

    .btn {
      background: #1d4ed8;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 50px;
      display: inline-block;
      margin-top: 10px;
    }

    footer {
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>

  <!-- Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Mobile Phones",
    "url": "https://yourdomain.com"
  }
  </script>

</head>

<body>

<header>
  <h1>Best Mobile Phones in 2026</h1>
  <p>Compare latest smartphones with price & features</p>
</header>

<div class="container">

  <h2>Featured Smartphones</h2>

  <div class="products" id="products"></div>

</div>

<footer>
  <p>© 2026 Mobile Phones - All Rights Reserved</p>
</footer>

<script>
const products = [
  {
    name: "Samsung Galaxy Ultra X Price in Pakistan",
    price: "$999",
    img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
  },
  {
    name: "iPhone Pro Max 2026 Price",
    price: "$1099",
    img: "https://images.unsplash.com/photo-1592750475338-74b7b21085ab"
  },
  {
    name: "Google Pixel Vision Pro Price",
    price: "$800",
    img: "https://images.unsplash.com/photo-1580910051074-3eb694886505"
  }
];

let container = document.getElementById("products");

products.forEach(p => {
  container.innerHTML += `
  <div class="card">
    <img src="${p.img}" alt="${p.name}" loading="lazy">
    <h3>${p.name}</h3>
    <p>${p.price}</p>
    <a href="#" class="btn">Buy Mobile Phone</a>
  </div>`;
});
</script>

</body>
</html>
